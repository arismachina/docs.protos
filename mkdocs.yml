site_name: Protos Docs
site_url: https://docs.protos.arismachina.com
site_description: Documentation for the Protos R&D platform by Aris Machina

theme:
  name: material
  palette:
    # Light mode — follows OS preference automatically
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
    # Dark mode — follows OS preference automatically
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
    - navigation.indexes
  logo: images/aris-logo.svg
  favicon: images/aris-favicon-black.png
  custom_dir: overrides

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Library:
    - Schemas: Schemas.md
    - Models Library:
      - Model-Library.md
      - Cell Performance: Model-Cell-Performance.md
      - Cell Optimizer: Model-Cell-Optimizer.md
      - DFN Calendar Ageing: Model-DFN-Calendar-Ageing.md
      - DFN Cyclic Ageing: Model-DFN-Cyclic-Ageing.md
      - SPMeT Power: Model-SPMeT-Power.md
      - SPMeT DCIR: Model-SPMeT-DCIR.md
      - SPMeT Dynamic Load: Model-SPMeT-Dynamic-Load.md
    - Knowledge Library: Knowledge-Library.md
  - Design:
    - Data Studio: Data-Studio.md
    - Simulation Studio: Simulation-Studio.md
  - Co-engineer: Co-engineer.md
  - MCP Connections: MCP-Connections.md
  - Collaboration & Sharing: Collaboration-and-Sharing.md
  - Glossary: Glossary.md
  - Tutorials:
    - Creating Your First Schema: Tutorial-Schemas.md
    - Setting Up Your Knowledge Library: Tutorial-Knowledge-Library.md
    - Working with the Co-engineer: Tutorial-Co-engineer.md
    - Using the Data Studio: Tutorial-Data-Studio.md
    - Registering Your First Model: Tutorial-Model-Library.md
    - Building Your First Canvas: Tutorial-Simulation-Studio.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - toc

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arismachina

copyright: Maintained by Aris Machina
